version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Settings saved via the UI are persisted to ./config/.env on the host
      - SETTINGS_DIR=/app/config
      # Optional: pre-set credentials here instead of using the setup wizard
      # - AZURE_SUBSCRIPTION_ID=
      # - AZURE_TENANT_ID=
      # - AZURE_CLIENT_ID=
      # - AZURE_CLIENT_SECRET=
      # - AZURE_OPENAI_ENDPOINT=
      # - AZURE_OPENAI_KEY=
      # - AZURE_OPENAI_DEPLOYMENT=gpt-4o-mini
    volumes:
      # Settings persistence — credentials saved in the UI survive restarts
      - ./config:/app/config
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
